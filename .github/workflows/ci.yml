name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ["1.24.x"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test -v -count=1 ./...

      - name: Test with race detector
        if: matrix.os == 'ubuntu-latest'
        run: go test -race -count=1 ./...

  testvectors:
    name: Official Test Vectors (RFC 8251)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Download test vectors
        run: |
          mkdir -p testdata
          curl -L -o testdata/opus_testvectors.tar.gz \
            https://opus-codec.org/testvectors/opus_testvectors-rfc8251.tar.gz
          tar -xzf testdata/opus_testvectors.tar.gz -C testdata/
          ls testdata/

      - name: Run test vector suite
        run: go test -v -run TestOfficialVectors ./...

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Run benchmarks
        run: go test -bench=. -benchmem -run='^$' ./...
