name: Libopus Interoperability (opusref)

on:
  push:
    branches:
      - main
      - "dev/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: opusref-${{ github.ref }}
  cancel-in-progress: true

jobs:
  opusref:
    name: reference tests vs libopus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install and configure libopus
        run: |
          sudo apt-get install -y libopus-dev
          echo "CGO_CFLAGS=$(pkg-config --cflags opus)" >> "$GITHUB_ENV"

      - name: SILK encoder quality (AB vs libopus)
        run: go test -tags opusref -count=1 -v -run TestOpusSILKABAgainstLibopusEncoder .

      - name: SILK encoder conformance (SILKOnly)
        run: go test -tags opusref -count=1 -run TestCGOEncodeRefSILKOnly .

      - name: Short-frame interoperability
        run: go test -tags opusref -count=1 -run '^TestCGOEncodeRefShortFrames$' .

      - name: SILK and hybrid FEC interoperability
        run: go test -tags opusref -count=1 -run '^TestCGOEncodeRefSILKFEC$|^TestCGOEncodeRefSILKFECMultiFrame$|^TestCGODecodeFECMatchesLibopus$|^TestCGODecodeFECStereoAndHybrid$' .

      - name: Multistream interoperability
        run: go test -tags opusref -count=1 -run '^TestCGOMultistreamInteroperability$' .

      - name: Projection interoperability
        run: go test -tags opusref -count=1 -run '^TestCGOProjectionMatricesMatchLibopus$|^TestCGOProjectionFamily[23]Interoperability$' .

      - name: Packet extensions libopus oracle
        run: go test -tags opusref -count=1 -run '^TestPacketExtensionsLibopusOracle$' .

      - name: Decoder reference (12/12 vectors)
        run: go test -tags opusref -count=1 -run TestCGORef .
