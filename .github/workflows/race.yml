name: Race

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: race-${{ github.ref }}
  cancel-in-progress: true

jobs:
  race:
    name: race (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    env:
      # Surface the first data race with a full report and a non-zero exit.
      GORACE: halt_on_error=1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Report toolchain / arch
        run: |
          go version
          go env GOARCH GOOS

      - name: Download RFC 8251 test vectors
        run: |
          set -euo pipefail
          mkdir -p testdata
          curl -fSL -o /tmp/opus_testvectors.tar.gz \
            https://opus-codec.org/docs/opus_testvectors-rfc8251.tar.gz
          tar -xzf /tmp/opus_testvectors.tar.gz -C testdata/
          if [ ! -f testdata/opus_newvectors/testvector01.bit ]; then
            src="$(find testdata -name testvector01.bit | head -n1)"
            if [ -n "$src" ]; then
              mkdir -p testdata/opus_newvectors
              cp "$(dirname "$src")"/* testdata/opus_newvectors/
            fi
          fi

      - name: go test -race
        run: go test -race -count=1 ./...
