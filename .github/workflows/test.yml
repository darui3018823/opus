name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: generated files and vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify generated files
        run: |
          go generate ./...
          git diff --exit-code

      - name: go vet
        run: go vet ./...

  native-test:
    name: native test (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            setup-arch: x64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            setup-arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: amd64
            setup-arch: x64
            runner: macos-15-intel
          - os: macos
            arch: arm64
            setup-arch: arm64
            runner: macos-15
          - os: windows
            arch: amd64
            setup-arch: x64
            runner: windows-latest
          # windows-11-arm is a standard GitHub-hosted runner in public
          # preview. This cell runs the tests natively; it is not a cross-build.
          - os: windows
            arch: arm64
            setup-arch: arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v7

      - name: Set up native Go toolchain
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          architecture: ${{ matrix.setup-arch }}
          cache: true

      - name: Report native toolchain
        run: |
          go version
          go env GOOS GOARCH GOHOSTOS GOHOSTARCH

      - name: go test (native)
        run: go test -count=1 ./...

  official-vectors:
    name: official RFC 8251 vectors (12/12)
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Download RFC 8251 test vectors
        run: |
          set -euo pipefail
          mkdir -p testdata
          curl -fSL -o /tmp/opus_testvectors.tar.gz \
            https://opus-codec.org/docs/opus_testvectors-rfc8251.tar.gz
          tar -xzf /tmp/opus_testvectors.tar.gz -C testdata/
          if [ ! -f testdata/opus_newvectors/testvector01.bit ]; then
            src="$(find testdata -name testvector01.bit | head -n1)"
            if [ -n "$src" ]; then
              mkdir -p testdata/opus_newvectors
              cp "$(dirname "$src")"/* testdata/opus_newvectors/
            fi
          fi
          test -f testdata/opus_newvectors/testvector01.bit

      - name: Run all vector-backed package tests
        run: go test -count=1 ./...

      - name: Run all official decoder vectors (verbose)
        run: go test -count=1 -v -run '^TestOfficialVectors$' .
